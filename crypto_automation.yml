name: Automated Crypto ETL Pipeline

# =====================================================================
# 1. TRIGGERS
# =====================================================================
on:
  schedule:
    - cron: '0 0 * * *'  # Executes automatically at 00:00 UTC daily
  workflow_dispatch:     # Enables manual execution via the GitHub Actions UI

# =====================================================================
# 2. PERMISSIONS
# =====================================================================
permissions:
  contents: write        # Grants write permissions to the repository to save data artifacts

# =====================================================================
# 3. WORKFLOW JOBS
# =====================================================================
jobs:
  run-pipeline:
    runs-on: ubuntu-latest  # Provisions a standard Linux runner environment

    steps:
      # Step A: Clone the repository
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step B: Configure the Python environment
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Install external dependencies
      - name: Install Runtime Dependencies
        run: |
          pip install requests

      # Step D: Execute the core extraction and loading script
      - name: Execute ETL Pipeline
        run: python crypto_pipeline.py

      # Step E: Version control the updated database artifact
      - name: Save and Commit Data Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crypto_portfolio.db
          git commit -m "Automated database update [skip ci]" || echo "No changes detected"
          git push
